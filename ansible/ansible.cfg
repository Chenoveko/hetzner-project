[defaults]
inventory        = inventories/production
roles_path       = roles
collections_path = collections
forks            = 8
interpreter_python = /usr/bin/python3
remote_port      = 22
gathering = explicit
gather_subset = all
gather_timeout = 10
host_key_checking = False
timeout = 10
log_path = /tmp/ansible.log
strategy = linear

[inventory]
enable_plugins = ini, host_list, virtualbox, yaml, constructed

